<body>
    <header>
        <h1>Consultório Odontológico</h1>
    </header>
    <section>
        <form>
            <p>Nome:
                <input type="text" id="inPaciente" required autofocus>

        <h2>Em atendimento: <span id="outAtendimento"></span></h2>

        <pre id="outFila"></pre>
